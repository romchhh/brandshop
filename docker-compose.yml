# На Docker Engine 24+ legacy-клієнт `docker-compose` 1.29.x часто падає при recreate:
# KeyError: 'ContainerConfig'. Використовуйте плагін V2: `docker compose up -d` (без дефісу).
# Поле `version` у файлі не потрібне (Compose V2 його ігнорує і попереджає).

volumes:
  pgdata_gma:
  redis_data:

networks:
    djangonetwork:
        driver: bridge

services:
  project_db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_gma:/var/lib/postgresql/data
    networks:
     - djangonetwork

  server:
    build:
      context: ./server
    container_name: django_server
    volumes:
      - ./server:/app
      # Той самий шлях, що DJANGO_MEDIA_ROOT (за замовчуванням /app/media = server/media).
      - ${MEDIA_VOLUME_HOST_PATH:-./server/media}:${DJANGO_MEDIA_ROOT:-/app/media}
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST:-project_db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      PAY_MERCHANT_ID: ${PAY_MERCHANT_ID}
      PAY_SECRET_KEY: ${PAY_SECRET_KEY}
      API_HOST: 'http://localhost:8001'
      BOT_TOKEN: ${TELEGRAM_TOKEN}
      ADMIN_ID: ${ADMIN_ID}
      ADMIN_IDS: ${ADMIN_IDS:-}
      # Довгий імпорт з Google Таблиць (gunicorn --timeout)
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-3600}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      # Публічний URL API для фото товарів у клієнті (без / в кінці), напр. https://api.brandshop.in.ua
      API_PUBLIC_URL: ${API_PUBLIC_URL:-}
      # Порожньо = server/media у volume. На VPS: /var/www/brandshop/media (той самий шлях у nginx alias).
      DJANGO_MEDIA_ROOT: ${DJANGO_MEDIA_ROOT:-}
      API_PUBLIC_CACHE_MAX_AGE: ${API_PUBLIC_CACHE_MAX_AGE:-120}
      # JSON-кеш каталогу/акцій у Redis (DB 2, не змішувати з Celery 0)
      DJANGO_CACHE_REDIS_URL: ${DJANGO_CACHE_REDIS_URL:-redis://redis:6379/2}
      API_JSON_CACHE_TTL: ${API_JSON_CACHE_TTL:-180}
    networks:
     - djangonetwork
    depends_on:
      - project_db
      - redis

  bot:
    build:
      context: ./bot
    container_name: telegram_bot
    depends_on:
      - server
      - redis
    volumes:
      - ./bot:/app
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      SITE_URL: 'http://localhost:3002'
      ADMIN_ID: ${ADMIN_ID}
      ADMIN_IDS: ${ADMIN_IDS:-}
      # Ім'я сервісу в цьому файлі — `server` (без _). Хост `django_server` містить `_` і Django відхиляє його за RFC 1034/1035.
      SERVER_URL: http://server:8000
    networks:
      - djangonetwork

  client:
    build:
      context: ./client-give-me-app
      args:
        NEXT_PUBLIC_API_HOST: ${NEXT_PUBLIC_API_HOST:-http://localhost:8000}
        NEXT_PUBLIC_IMAGE_UPSTREAM: ${NEXT_PUBLIC_IMAGE_UPSTREAM:-http://server:8000}
        NEXT_PUBLIC_MEDIA_SAME_ORIGIN: ${NEXT_PUBLIC_MEDIA_SAME_ORIGIN:-1}
        NEXT_PUBLIC_DEV: ${NEXT_PUBLIC_DEV:-1}
    container_name: react_client
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_HOST: ${NEXT_PUBLIC_API_HOST:-http://localhost:8000}
      NEXT_PUBLIC_IMAGE_UPSTREAM: ${NEXT_PUBLIC_IMAGE_UPSTREAM:-http://server:8000}
      NEXT_PUBLIC_MEDIA_SAME_ORIGIN: ${NEXT_PUBLIC_MEDIA_SAME_ORIGIN:-1}
      NEXT_PUBLIC_DEV: ${NEXT_PUBLIC_DEV:-1}
    volumes:
      # Той самий каталог, що MEDIA_ROOT у Django (локально ./server/media). Якщо DJANGO_MEDIA_ROOT=/var/www/... — змонтуйте його сюди замість рядка нижче.
      - ${MEDIA_VOLUME_HOST_PATH:-./server/media}:/app/public/media
    networks:
      - djangonetwork
    depends_on:
      - server

  redis:
    image: "redis:latest"
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
     - djangonetwork
